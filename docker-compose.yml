version: '3.8'
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: phsp
      POSTGRES_PASSWORD: phsp
      POSTGRES_DB: phsp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "phsp"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
