<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
</head>
<body>
  <div class="card">
    <h1>Login</h1>
    <input id="username" placeholder="Username" />
    <div id="uErr" class="error"></div>
    <input id="password" type="password" placeholder="Password" />
    <div id="pErr" class="error"></div>
    <button id="loginBtn">Login</button>
    <p><a href="/signup">Need an account? Sign up</a> | <a href="/forgot">Forgot password?</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script>
    const uInput = document.getElementById('username');
    const pInput = document.getElementById('password');
    document.getElementById('loginBtn').onclick = async () => {
      const username = uInput.value.trim();
      const password = pInput.value;
      document.getElementById('uErr').textContent = '';
      document.getElementById('pErr').textContent = '';
      if (!username) { document.getElementById('uErr').textContent = 'Required'; return; }
      if (!password) { document.getElementById('pErr').textContent = 'Required'; return; }
      const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      const data = await res.json();
      if (data.success) {
        Toastify({ text: 'Logged in', backgroundColor: '#4caf50', duration: 1500 }).showToast();
        setTimeout(() => location.href = '/', 1500);
      } else {
        Toastify({ text: data.error || 'Error', backgroundColor: '#c00' }).showToast();
        if (res.status === 401) document.getElementById('pErr').textContent = 'Invalid credentials';
      }
    };
  </script>
</body>
</html>
