<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apps</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="card">
    <div class="toolbar">
      <button id="appsBtn">Apps</button>
      <button id="toolsBtn">Tools</button>
    </div>
    <input id="search" placeholder="Search" />
    <div id="content" style="margin-top:10px;">Apps list</div>
  </div>
  <script>
    const content = document.getElementById('content');
    document.getElementById('appsBtn').onclick = () => content.textContent = 'Apps list';
    document.getElementById('toolsBtn').onclick = () => content.textContent = 'Tools list';
  </script>
</body>
</html>
